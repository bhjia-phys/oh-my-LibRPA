<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="oh-my-LibRPA mark">
  <defs>
    <linearGradient id="rocket-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
    <linearGradient id="rocket-flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B2F5EA"/>
      <stop offset="50%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D9F3EF"/>
      <stop offset="100%" stop-color="#A7E0D7"/>
    </linearGradient>
    <g id="bubble" fill="none" stroke-linecap="round" stroke-width="5.5">
      <path d="M-18,0 A22,22 0 0,1 18,0 A22,22 0 0,1 -18,0" stroke="#00796B"/>
      <path d="M-18,0 A22,22 0 0,0 18,0 A22,22 0 0,0 -18,0" stroke="#004D40"/>
    </g>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="132" fill="none" stroke="url(#orbit-grad)" stroke-width="10" stroke-dasharray="8 14" opacity="0.9"/>
  <circle cx="256" cy="256" r="96" fill="#F7FCFB" opacity="0.88"/>

  <g opacity="0.96">
    <use href="#bubble" transform="translate(256 112) scale(1.02)"/>
    <use href="#bubble" transform="translate(332 134) rotate(28) scale(0.96)"/>
    <use href="#bubble" transform="translate(388 190) rotate(56) scale(0.9)"/>
    <use href="#bubble" transform="translate(404 266) rotate(90) scale(0.84)"/>
    <use href="#bubble" transform="translate(382 338) rotate(122) scale(0.78)" opacity="0.92"/>
    <use href="#bubble" transform="translate(326 390) rotate(150) scale(0.72)" opacity="0.84"/>
    <use href="#bubble" transform="translate(256 404) rotate(180) scale(0.64)" opacity="0.74"/>
    <use href="#bubble" transform="translate(186 390) rotate(210) scale(0.58)" opacity="0.60"/>
    <use href="#bubble" transform="translate(130 338) rotate(238) scale(0.50)" opacity="0.44"/>
    <use href="#bubble" transform="translate(110 266) rotate(270) scale(0.42)" opacity="0.30"/>
  </g>

  <g transform="translate(256 250) rotate(10)" filter="url(#soft-glow)">
    <path d="M0 -88 C28 -70 46 -32 46 8 C46 42 28 74 0 92 C-28 74 -46 42 -46 8 C-46 -32 -28 -70 0 -88 Z" fill="url(#rocket-body)"/>
    <path d="M0 -88 C14 -80 24 -66 27 -50 C13 -56 -13 -56 -27 -50 C-24 -66 -14 -80 0 -88 Z" fill="#BFF3EC" opacity="0.82"/>
    <ellipse cx="0" cy="-14" rx="17" ry="22" fill="#E8FFFB" stroke="#00796B" stroke-width="4"/>
    <path d="M-46 22 L-84 50 L-36 58 Z" fill="#26A69A"/>
    <path d="M46 22 L84 50 L36 58 Z" fill="#00796B"/>
    <path d="M-20 72 L-36 116 L-2 94 Z" fill="#26A69A"/>
    <path d="M20 72 L36 116 L2 94 Z" fill="#00796B"/>
    <path d="M0 94 C18 112 18 140 0 162 C-18 140 -18 112 0 94 Z" fill="url(#rocket-flame)" opacity="0.97"/>
    <path d="M0 112 C8 122 8 138 0 150 C-8 138 -8 122 0 112 Z" fill="#F5FFFD" opacity="0.92"/>
  </g>

  <circle cx="190" cy="160" r="5.5" fill="#26A69A" opacity="0.8"/>
  <circle cx="344" cy="150" r="4.5" fill="#00796B" opacity="0.7"/>
  <circle cx="166" cy="340" r="4.5" fill="#26A69A" opacity="0.5"/>
</svg>

- id: librpa-task-switch-201
  scene: User requests a GW or RPA calculation
  symptom: Need to select the top-level LibRPA task mode
  root_cause: GW and RPA requests must branch at the `task` field in `librpa.in`
  fix:
    - If the user requests GW, set `task = g0w0_band`
    - If the user requests RPA, set `task = rpa`
  verify:
    - Confirm the requested workflow type with the user intent
    - Confirm the generated `librpa.in` contains the expected `task` value
  applies_to:
    mode:
      - gw
      - rpa

- id: librpa-shared-defaults-202
  scene: Conservative shared runtime baseline for `librpa.in`
  symptom: Need a reproducible preset before system-specific tuning
  root_cause: Too many ad-hoc initial parameter sets make diagnosis and reuse harder
  fix:
    - `nfreq = 16`
    - `use_soc = 0/1` according to the INPUT spin/SOC state
    - `use_scalapack_gw_wc = t`
    - `use_scalapack_ecrpa = t`
    - `parallel_routing = libri`
    - `vq_threshold = 0`
    - `sqrt_coulomb_threshold = 0`
    - `use_fullcoul_exx = t`
    - `libri_chi0_threshold_C = 1e-4`
    - `libri_chi0_threshold_G = 1e-5`
    - `libri_exx_threshold_V = 1e-1`
    - `libri_exx_threshold_C = 1e-4`
    - `libri_exx_threshold_D = 1e-4`
  verify:
    - Confirm all shared defaults are present in the generated `librpa.in`
    - Run smoke validation before tighter tuning
  applies_to:
    mode:
      - gw
      - rpa

- id: librpa-gw-only-defaults-203
  scene: GW-specific `librpa.in` additions
  symptom: Need the full GW-band route rather than the shorter RPA route
  root_cause: GW requires dielectric-function preprocessing, but the heavy real-space imaginary-frequency `Sigc` dump should stay opt-in
  fix:
    - `task = g0w0_band`
    - `option_dielect_func = 3`
    - `replace_w_head = t`
    - Keep `output_gw_sigc_mat_rf = f` by default
    - Set `output_gw_sigc_mat_rf = t` only when the user explicitly asks to open NSCF band continuation
    - `libri_g0w0_threshold_C = 1e-5`
    - `libri_g0w0_threshold_G = 1e-5`
    - `libri_g0w0_threshold_Wc = 1e-6`
  verify:
    - Confirm GW route is requested
    - Confirm `output_gw_sigc_mat_rf` matches whether explicit NSCF band continuation was requested
    - Confirm the remaining GW-only fields are present in `librpa.in`
  applies_to:
    mode: gw

- id: librpa-gw-molecule-short-route-205
  scene: Molecular GW smoke route without NSCF or pyatb
  symptom: Periodic GW defaults leave the short molecular route with the wrong handoff settings
  root_cause: The tested molecular path needs direct SCF -> LibRPA handoff and does not use the periodic W-head treatment or shrink lane by default
  fix:
    - `task = g0w0_band`
    - `option_dielect_func = 3`
    - `replace_w_head = f`
    - `use_soc = 0` unless the chosen spin/SOC route overrides it
    - `use_shrink_abfs = f`
    - Keep the shared GW thresholds and keep `output_gw_sigc_mat_rf = f`
  verify:
    - Confirm the route is molecular GW without NSCF/pyatb
    - Confirm `replace_w_head = f`, `use_shrink_abfs = f`, and `output_gw_sigc_mat_rf = f` are present in `librpa.in`
  applies_to:
    mode: gw
    system_type: molecule

- id: librpa-rpa-short-route-204
  scene: RPA calculation route
  symptom: Need the shorter RPA path without GW preprocessing
  root_cause: Standard RPA does not require dielectric-function preprocessing, pyatb, NSCF, or band preprocessing
  fix:
    - `task = rpa`
    - do not insert `option_dielect_func = 3` as a GW dependency
    - do not run `pyatb`
    - do not run NSCF
    - do not run `preprocess_abacus_for_librpa_band.py`
  verify:
    - Confirm RPA route is requested
    - Confirm no GW-only preprocessing step is inserted
  applies_to:
    mode: rpa

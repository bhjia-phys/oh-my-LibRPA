- id: server-profile-runtime-901
  scene: Remote periodic GW or RPA run on a specific HPC host
  symptom: Batch jobs see a different PATH, python, or MPI launcher than the interactive shell
  root_cause: The workflow relied on shell defaults instead of an explicit host profile materialized into the case directory
  fix:
    - Resolve a host profile from `registry/host-profiles/*.env`
    - Materialize `env.sh` with `scripts/materialize_server_profile.sh --case-dir <case_dir> --profile <name-or-path>`
    - Use `env.sh` to set explicit `python3_exec`, `abacus_work`, `librpa_work`, launcher paths, and any required `.bashrc` / conda activation steps
    - If the batch layout is `1 MPI rank/node`, set `--cpus-per-task` and `OMP_NUM_THREADS` to the full node-core count unless the user explicitly asks for a smaller OpenMP allocation
    - If compute-node behavior is still uncertain, materialize `probe_batch.sh` with `scripts/materialize_batch_probe.sh`
    - Record the resolved runtime config in the run directory
  verify:
    - Confirm `env.sh` exists in the case directory
    - Confirm `resolved-runtime.env` is written during execution
    - Confirm batch logs print explicit python3 and launcher paths
    - Confirm the intended `.bashrc` / conda environment was activated when the host profile expects it
  applies_to:
    mode: gw
    system_type: solid

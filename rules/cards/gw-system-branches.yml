- id: gw-molecule-branch-301
  scene: User requests GW for a molecular system
  symptom: Need a molecule-specific workflow path instead of the solid-state default chain
  root_cause: Molecules skip the DF/pyatb stage, and some builds need route-aware handling of `gamma_only`
  fix:
    - Set `KPT` to `1 1 1`
    - Treat `gamma_only` as a route-aware option instead of a universal hard rule
    - Use official ABACUS input parameter names from the ABACUS input documentation
    - Do not run `pyatb`
    - Set `replace_w_head = f` in `librpa.in`
    - Materialize the tested short smoke route with `scripts/materialize_gw_template.sh --case-dir <case_dir> --system-type molecule --needs-nscf false --needs-pyatb false --use-shrink-abfs false` instead of copying the generic template by hand
  verify:
    - Confirm `KPT` is `1 1 1`
    - Confirm `replace_w_head = f` in `librpa.in`
    - Confirm no `pyatb_librpa_df` stage is inserted into the workflow
    - Confirm the selected output set is internally consistent with the chosen `gamma_only` setting
  applies_to:
    mode: gw
    system_type: molecule

- id: gw-solid-branch-302
  scene: User requests GW for a solid-state system
  symptom: Need the full periodic workflow with dielectric preprocessing and band-path preparation
  root_cause: Solids require k-point sampling, DF generation, and NSCF band-path preprocessing
  fix:
    - Ask for `KPT` mesh size; default to `8 8 8`
    - Require the user to define `KPT_nscf`
    - Run `SCF`
    - Run `pyatb` to generate `pyatb_librpa_df`
    - Run `NSCF`
    - Run `preprocess_abacus_for_librpa_band.py`
    - Run `LibRPA`
    - Prefer scripts and reference inputs from `/mnt/sg001/home/ks_iopcas_ghj/gw/template`
  verify:
    - Confirm the chosen `KPT` mesh in `KPT`
    - Confirm `KPT_nscf` is provided by the user
    - Confirm the `pyatb_librpa_df` directory is generated after `pyatb`
    - Confirm band information files are generated before `LibRPA`
  applies_to:
    mode: gw
    system_type: solid

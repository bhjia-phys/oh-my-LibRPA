- id: molecular-gw-short-route-701
  scene: Molecule + GW + no NSCF + no pyatb + no shrink smoke route
  symptom: The generic periodic GW defaults overproduce files, miss the direct LibRPA handoff, or make `gamma_only` logic self-contradictory
  root_cause: This route is shorter than the periodic GW chain and needs a dedicated template rather than layered patches
  fix:
    - Materialize the case with `scripts/materialize_gw_template.sh --case-dir <case_dir> --system-type molecule --needs-nscf false --needs-pyatb false --use-shrink-abfs false`
    - Treat the generated `.oh-my-librpa-route.env` and `OH_MY_LIBRPA_REFERENCE_TEMPLATE` as the authoritative route record
    - Keep `out_mat_xc 1`
    - Do not enable `out_chg` when no NSCF stage is planned
    - Do not enable `out_mat_r` or `out_mat_hs2` when `pyatb` is not part of the route
    - Set `exx_singularity_correction = massidda`
    - Set `exx_pca_threshold = 1e-6`
    - Set `rpa_ccp_rmesh_times = 6`
    - Set `exx_ccp_rmesh_times = 3`
    - Set `exx_cs_inv_thr = 1e-5`
    - Set `replace_w_head = f`
    - Set `use_shrink_abfs = f`
    - Copy `OUT.ABACUS/vxc_out.dat` into the working directory as `vxc_out` after SCF
    - Stop early unless at least one `coulomb_mat_*.txt` file exists before LibRPA starts
    - Treat `gamma_only` as route-aware, not a universal hard rule
  verify:
    - Confirm `vxc_out` exists in the working directory before LibRPA
    - Confirm at least one `coulomb_mat_*.txt` file exists before LibRPA
    - Confirm `band_out`, `vxc_out`, and a rank-0 LibRPA output file (`librpa_para_nprocs_*_myid_0.out` or `LibRPA*.out`) exist after the run
    - Confirm rank-0 output contains `libRPA finished successfully`
  applies_to:
    mode: gw
    system_type: molecule

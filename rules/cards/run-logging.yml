rule: run-logging
summary: Keep a run-local Markdown report plus one archived copy under the active platform root.
requirements:
  - Create `run-report.md` inside the fresh run directory
  - Create a second archived Markdown copy under `<platform-root>/librpa/oh-my-librpa/`
  - Update both logs after each verified stage
  - Surface a short stage summary back to the user
notes:
  - The platform root is inferred from the installed script location unless `OH_MY_LIBRPA_ARCHIVE_ROOT` overrides it.
  - Typical roots are `.openclaw/workspace/`, `.opencode/`, and `.codex-home/`.

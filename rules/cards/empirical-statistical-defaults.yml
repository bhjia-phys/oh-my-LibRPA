- id: nfreq-smoke-ladder-101
  scene: Initial smoke run for GW/RPA workflow
  symptom: Need a stable first-pass run before high-accuracy tuning
  root_cause: Starting directly with aggressive frequency grids increases failure/debug complexity
  fix:
    - Set nfreq = 16 for first smoke pass
    - After success, increase to 24 or 32 stepwise
    - Change only one major parameter per iteration
  verify:
    - Smoke run completes and key outputs are generated
    - First accuracy-upgrade run keeps numerical behavior stable
  applies_to:
    source: generic HPC GW inventory sample
    observed:
      nfreq_16_count: 176

- id: shrink-abfs-default-lane-102
  scene: GW calculations with shrink_abfs path
  symptom: Frequent setup confusion around coupled thresholds
  root_cause: shrink should be the default lane, but companion thresholds are easy to misuse
  fix:
    - Enable `use_shrink_abfs = t` by default
    - Ensure `INPUT_scf` contains:
      - `rpa 1`
      - `exx_pca_threshold 10`
      - `shrink_abfs_pca_thr 1e-4`
      - `shrink_lu_inv_thr 1e-3`
      - `cs_inv_thr 1e-5`
    - Interpret `shrink_abfs_pca_thr` as the control on compressed auxiliary-basis size
    - Interpret `shrink_lu_inv_thr` as the inversion-error control for output `sinvS`
    - Interpret `exx_pca_threshold = 10` as the external-input route when shrink is enabled
  verify:
    - Static checker passes all required coupled keys
    - Short smoke run succeeds before scaling up
  applies_to:
    source: generic HPC GW inventory sample
    observed:
      use_shrink_abfs_t_count: 156
      exx_pca_threshold_10_count: 367
      shrink_lu_inv_thr_1e-3_count: 74
      cs_inv_thr_1e-5_count: 51
